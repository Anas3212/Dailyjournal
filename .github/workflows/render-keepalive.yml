name: Keep Render Backend Awake

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render Backend
        run: |
          URL="https://dailyjournal-5dnq.onrender.com/actuator/health"

          STATUS=$(curl -L -X GET \
            --max-time 30 \
            --connect-timeout 10 \
            -s \
            -o /dev/null \
            -w "%{http_code}" \
            "$URL")

          echo "HTTP Status: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is healthy."
          else
            echo "❌ Backend returned HTTP $STATUS"
            exit 1
          fi
