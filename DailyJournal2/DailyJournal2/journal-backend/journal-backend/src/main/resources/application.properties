

spring.application.name=journal-backend
spring.datasource.url=${DATABASE_URL:jdbc:mysql://127.0.0.1:3306/journal_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:anas@mysql}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=${PORT:8080}

# Database connection pool timeouts
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

spring.web.resources.static-locations=file:profile-photos/

# Spring basic security user (optional if not used)
spring.security.user.name=admin
spring.security.user.password=admin123

# JWT Configuration
jwt.secret=your-secure-jwt-secret-key-daily-journal-512bits!
jwt.expiration=86400000
# Optional: 1 day in milliseconds

# Cookie-based JWT Configuration (Production Ready)
jwt.access-token-expiration=3600000
# Access token: 1 hour (3,600,000 ms)
jwt.refresh-token-expiration=2592000000
# Refresh token: 30 days (2,592,000,000 ms)

# Session Management Configuration (Enterprise-grade)
app.session.cookie-name=dj_session
app.session.timeout-hours=8
app.session.max-sessions-per-user=10
app.session.cookie.secure=true
app.session.cookie.same-site=None
app.session.cookie.http-only=true

logging.level.org.springframework.security=WARN
logging.level.org.springframework=WARN
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

app.base-url=http://localhost:8080
journal.media.max-files=4


# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}



